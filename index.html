<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para você</title>
<style>
body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:Georgia,serif;
  color:white;
  text-align:center;

  background-image:url("fundo.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* camada escura */
.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1;
}

/* tela inicial */
.start-screen{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,3vw,26px);
  letter-spacing:2px;
  background:rgba(0,0,0,0.65);
  cursor:pointer;
  transition:opacity 0.5s;
  z-index:30;
}

/* texto */
.container{
  position:relative;
  max-width:90%;
  padding:clamp(20px,4vw,40px);
  line-height:1.8;
  background:rgba(0,0,0,0.25);
  border-radius:12px;
  backdrop-filter:blur(4px);
  text-shadow:0 2px 15px rgba(0,0,0,0.9);
  opacity:0;
  transform:translateY(20px);
  transition:opacity 1.2s, transform 1.2s;
  z-index:2;
}
.container.show{
  opacity:1;
  transform:translateY(0);
}

/* frase final */
.final{
  font-size:clamp(28px,5vw,40px);
  letter-spacing:2px;
}

/* indicadores de toque */
.touch-indicator{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:clamp(18px,2vw,26px);
  color:rgba(255,255,255,0.35);
  user-select:none;
  pointer-events:none;
  opacity:0;
  transition:opacity 1.5s;
  z-index:6;
}
.touch-indicator.left{ left:3%; }
.touch-indicator.right{ right:3%; }
.touch-indicator.show{ opacity:0.6; }

/* barra de progresso */
#progress-bar{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:4px;
  background:rgba(255,255,255,0.15);
  z-index:3;
  overflow:hidden;
  pointer-events:none;
}
#progress{
  height:100%;
  width:0%;
  background:white;
}

/* áreas de clique */
.click-zone{
  position:absolute;
  top:0;
  height:100%;
  width:50%;
  z-index:20;
  cursor:pointer;
}
.click-left{ left:0; }
.click-right{ right:0; }

</style>
</head>
<body>

<div class="overlay"></div>

<div class="start-screen" id="start">
✨ Toque na tela para começar
</div>

<div class="container" id="text"></div>
<div class="touch-indicator left">‹</div>
<div class="touch-indicator right">›</div>

<div class="click-zone click-left"></div>
<div class="click-zone click-right"></div>

<audio id="music" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div id="progress-bar">
  <div id="progress"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const frases = [
    "Dizem que a lua tem um brilho que chama atenção mesmo de longe.",
    "Mas, sendo sincero, o seu sorriso consegue fazer exatamente isso comigo.",
    "Seus olhos castanhos carregam uma calma que lembra o pôr do sol, quentes, intensos e difíceis de ignorar.",
    "Talvez eu esteja exagerando…",
    "Mas, se for pra comparar você com algo grandioso, eu escolheria tudo aquilo que faz a gente parar por alguns segundos só pra admirar.",
    "Existem coisas no mundo que não passam despercebidas:<br><br>a imensidão do mar,<br>o brilho da lua,<br>o silêncio bonito de um pôr do sol.",
    "E, de algum jeito, você entra nessa lista.",
    "<span class='final'>✨ Para o seu sorriso </span>"
  ];

  let index = 0;
  let timer = null;

  const text = document.getElementById("text");
  const start = document.getElementById("start");
  const music = document.getElementById("music");
  const progress = document.getElementById("progress");
  const clickLeft = document.querySelector(".click-left");
  const clickRight = document.querySelector(".click-right");
  const indicators = document.querySelectorAll(".touch-indicator");

  const mostrar = () => {
    text.classList.remove("show");
    progress.style.transition = "none";
    progress.style.width = "0%";

    setTimeout(() => {
      text.innerHTML = frases[index];
      text.classList.add("show");

      setTimeout(() => {
        progress.style.transition = "width 8s linear";
        progress.style.width = "100%";
      }, 50);
    }, 400);

    reiniciarTempo();
  };

  const proximo = () => {
    if(index < frases.length - 1){
      index++;
      mostrar();
    }
  };

  const voltar = () => {
    if(index > 0){
      index--;
      mostrar();
    }
  };

  const reiniciarTempo = () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      if(index < frases.length - 1){
        index++;
        mostrar();
      }
    }, 8000);
  };

// Modifique os eventos de clique para checar se o 'start' ainda existe
  clickLeft.addEventListener("pointerdown", () => {
    if (start.style.display === "none") {
      voltar();
    }
  });

  clickRight.addEventListener("pointerdown", () => {
    if (start.style.display === "none") {
      proximo();
    }
  });

  // Função para iniciar tudo
  const iniciar = () => {
    start.style.opacity = "0";
    start.style.pointerEvents = "none";

    setTimeout(() => {
      start.style.display = "none";
    }, 500);

    music.play().catch((e) => console.log("Erro ao tocar música:", e));
    indicators.forEach(i => i.classList.add("show"));
    mostrar();
  };

  // Escuta o clique na tela inteira para garantir que comece
  start.addEventListener("pointerdown", iniciar, { once: true });
});
</script>
</body>
</html>
