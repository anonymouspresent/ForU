<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para você</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
overflow:hidden;

display:flex;
align-items:center;
justify-content:center;

font-family: Georgia, serif;
color:white;
text-align:center;

background-image:url("fundo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* camada escura */

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

/* estrelas */

.stars{
position:absolute;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:3px 3px;
opacity:0.3;
animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:0.5;}
}

/* tela inicial */

.start-screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;
letter-spacing:2px;

background:rgba(0,0,0,0.6);

cursor:pointer;
transition:opacity 1.5s;
}

.start-screen.hide{
opacity:0;
pointer-events:none;
}

/* texto */

.container{
position:relative;
max-width:80%;
font-size:22px;
line-height:1.7;

text-shadow:0 2px 15px rgba(0,0,0,0.9);

opacity:0;
transform:translateY(20px);
transition:opacity 1.5s, transform 1.5s;
}

.container.show{
opacity:1;
transform:translateY(0);
}

/* frase final */

.final{
font-size:26px;
letter-spacing:2px;
}

/* áreas de clique */

.click-zone{
position:absolute;
top:0;
height:100%;
width:50%;
}

.left{ left:0; }
.right{ right:0; }

</style>
</head>

<body>

<div class="overlay"></div>
<div class="stars"></div>

<div class="start-screen" id="start">
✨ Toque na tela
</div>

<div class="container" id="text"></div>

<div class="click-zone left" onclick="voltar()"></div>
<div class="click-zone right" onclick="proximo()"></div>

<audio id="music" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const frases = [

"Dizem que a lua tem um brilho que chama atenção mesmo de longe.",

"Mas, sendo sincero, o seu sorriso consegue fazer exatamente isso comigo.",

"Seus olhos castanhos carregam uma calma que lembra o pôr do sol, quentes, intensos e difíceis de ignorar.",

"Talvez eu esteja exagerando…",

"Mas, se for pra comparar você com algo grandioso, eu escolheria tudo aquilo que faz a gente parar por alguns segundos só pra admirar.",

"Existem coisas no mundo que não passam despercebidas:<br><br>a imensidão do mar,<br>o brilho da lua,<br>o silêncio bonito de um pôr do sol.",

"E, de algum jeito, você entra nessa lista.",

"<span class='final'>✨ Para você</span>"

]

let index = 0
const text = document.getElementById("text")
const start = document.getElementById("start")
const music = document.getElementById("music")

function mostrar(){

text.classList.remove("show")

setTimeout(()=>{

text.innerHTML = frases[index]

text.classList.add("show")

},400)

}

function proximo(){

if(index < frases.length-1){
index++
mostrar()
}

}

function voltar(){

if(index > 0){
index--
mostrar()
}

}

/* iniciar experiência */

start.addEventListener("click", () => {

start.classList.add("hide")

music.play()

setTimeout(()=>{
mostrar()
},1000)

})

</script>

</body>
</html>
