<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Um pedacinho de luz</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
<meta property="og:title" content="Um pedacinho de luz ✨">
<meta property="og:description" content="Fiz algo especial para você. Abre quando puder...">
<meta property="og:image" content="fundo.jpg"> <meta name="theme-color" content="#000000">
<style>
body{
  margin:0;
  padding:0;
  height:100vh;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  font-family:Georgia,serif;
  color:white;
  text-align:center;

  background-image:url("fundo.jpg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

/* camada escura */
.overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:1;
}

/* tela inicial */
.start-screen{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(18px,3vw,26px);
  letter-spacing:2px;
  background:rgba(0,0,0,0.65);
  cursor:pointer;
  transition:opacity 0.5s;
  z-index:30;
}

/* texto */
.container{
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) translateY(20px);

  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;

  width: 85%;            /* Define uma largura fixa relativa à tela */
  max-width: 600px;       /* Impede que fique largo demais em PCs */
  min-height: 150px;      /* Mantém uma altura mínima para estabilidade */
  
  padding: clamp(25px, 5vw, 45px);
  line-height: 1.6;
  background: rgba(0,0,0,0.25);
  border-radius: 20px;    /* Arredondado mais suave */
  backdrop-filter: blur(8px);
  text-shadow: 0 2px 15px rgba(0,0,0,0.9);
  
  opacity: 0;
  transition: opacity 1.2s, transform 1.2s;
  z-index: 2;
  text-align: center;
}

.container.show{
  opacity: 1;
  transform: translate(-50%, -50%) translateY(0);
}

/* frase final */
.final{
  font-size:clamp(28px,5vw,40px);
  letter-spacing:2px;
}

/* indicadores de toque */
.touch-indicator{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:clamp(18px,2vw,26px);
  color:rgba(255,255,255,0.35);
  user-select:none;
  pointer-events:none;
  opacity:0;
  transition:opacity 1.5s;
  z-index:6;
}
.touch-indicator.left{ left:3%; }
.touch-indicator.right{ right:3%; }
.touch-indicator.show{ opacity:0.6; }

/* barra de progresso */
#progress-bar{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:4px;
  background:rgba(255,255,255,0.15);
  z-index:3;
  overflow:hidden;
  pointer-events:none;
}
#progress{
  height:100%;
  width:0%;
  background:white;
}

/* áreas de clique */
.click-zone{
  position:absolute;
  top:0;
  height:100%;
  width:50%;
  z-index:20;
  cursor:pointer;
}

/* Efeito de brilho no fundo */
body::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: 
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
    radial-gradient(circle at 70% 60%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
    radial-gradient(circle at 50% 10%, rgba(255,255,255,0.4) 1px, transparent 1.5px),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,0.4) 1px, transparent 1.5px);
  background-size: 300px 300px;
  animation: stars 20s linear infinite;
  z-index: 1; 
  pointer-events: none;
}

@keyframes stars {
  from { background-position: 0 0; }
  to { background-position: 0 -300px; }
}

/* Fundo da mensagem completa */
#full-message {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.95);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999; /* Garante que fique acima de tudo */
  backdrop-filter: blur(10px);
}

/* Caixa branca/transparente da carta */
.message-box {
  background: rgba(255, 255, 255, 0.08);
  padding: 25px;
  border-radius: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  width: 85%; /* Ajustado para não vazar nas bordas */
  max-width: 400px;
  box-sizing: border-box; /* Garante que o padding não aumente a largura */
  line-height: 1.5;
  font-size: clamp(14px, 3.8vw, 16px);
  text-align: left;
  color: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.assinatura {
  display: block;
  text-align: right;
  margin-top: 20px;
  font-style: italic;
  opacity: 0.8;
  font-size: 0.9em;
  letter-spacing: 1px;
}
  
#btn-ler-tudo {
  margin-top: 20px;
  padding: 12px 25px;
  background: rgba(255, 255, 255, 0.2);
  border: 2px solid white;
  color: white;
  border-radius: 30px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 1s;
  font-family: Georgia, serif;
  position: relative; 
  z-index: 999 !important;
  /* MUDANÇA AQUI: Impede cliques enquanto estiver invisível */
  pointer-events: none; 
}

/* Quando o botão ganha a classe .show, ele passa a aceitar cliques */
#btn-ler-tudo.show { 
  opacity: 1; 
  pointer-events: auto; 
}

#btn-ler-tudo.show { opacity: 1; }
  
.click-left{ left:0; }
.click-right{ right:0; }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="start-screen" id="start">
✨ Toque na tela para começar
</div>

<div class="container" id="text"></div>
<div class="touch-indicator left">‹</div>
<div class="touch-indicator right">›</div>

<div class="click-zone click-left"></div>
<div class="click-zone click-right"></div>

<audio id="music" loop playsinline preload="auto" muted>
  <source src="./musica.mp3" type="audio/mpeg">
</audio>

<div id="progress-bar">
  <div id="progress"></div>
</div>

<button id="btn-ler-tudo" onclick="abrirMensagem()">Ler mensagem completa</button>

<div id="full-message" onclick="fecharMensagem(event)">
  <div class="message-box" onclick="event.stopPropagation()">
    <p id="texto-inteiro" style="margin: 0;"></p>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0;">
    <p style="text-align:center; font-size: 12px; opacity: 0.6; margin: 0;">Toque fora para fechar</p>
  </div>
</div>

<script>
// Colocamos as funções de abrir mensagem fora para o botão HTML as encontrar
function abrirMensagem() {
  const frasesParaCarta = [
    "Dizem que a lua tem um brilho que chama atenção mesmo de longe.",
    "Mas, sendo sincero, o seu sorriso consegue fazer exatamente isso comigo.",
    "Seus olhos castanhos carregam uma calma que lembra o pôr do sol, quentes, intensos e difíceis de ignorar.",
    "Talvez eu esteja exagerando…",
    "Mas, se for pra comparar você com algo grandioso, eu escolheria tudo aquilo que faz a gente parar por alguns segundos só pra admirar.",
    "Existem coisas no mundo que não passam despercebidas: a imensidão do mar, o brilho da lua, o silêncio bonito de um pôr do sol.",
    "E, de algum jeito, você entra nessa lista.",
    "✨ Só queria te lembrar o quanto você é incrível.",
    "<span class='assinatura'>De Lucas para Thamires ❤️</span>" // Sua assinatura aqui
  ];
  
  const textoFormatado = frasesParaCarta.join('<br><br>');
  document.getElementById("texto-inteiro").innerHTML = textoFormatado;
  document.getElementById("full-message").style.display = 'flex';
}

function fecharMensagem(event) {
  // Só fecha se clicar no fundo preto, não na caixa de texto
  if (event.target.id === "full-message") {
    document.getElementById("full-message").style.display = 'none';
  }
}

document.addEventListener("DOMContentLoaded", () => {
  const frases = [
    "Dizem que a lua tem um brilho que chama atenção mesmo de longe.",
    "Mas, sendo sincero, o seu sorriso consegue fazer exatamente isso comigo.",
    "Seus olhos castanhos carregam uma calma que lembra o pôr do sol, quentes, intensos e difíceis de ignorar.",
    "Talvez eu esteja exagerando…",
    "Mas, se for pra comparar você com algo grandioso, eu escolheria tudo aquilo que faz a gente parar por alguns segundos só pra admirar.",
    "Existem coisas no mundo que não passam despercebidas:<br><br>a imensidão do mar,<br>o brilho da lua,<br>o silêncio bonito de um pôr do sol.",
    "E, de algum jeito, você entra nessa lista.",
    "<span class='final'>✨ Só queria te lembrar o quanto você é incrível.</span>"
  ];

  let index = 0;
  let timer = null;
  let iniciado = false;

  const text = document.getElementById("text");
  const start = document.getElementById("start");
  const music = document.getElementById("music");
  const progress = document.getElementById("progress");
  const clickLeft = document.querySelector(".click-left");
  const clickRight = document.querySelector(".click-right");
  const indicators = document.querySelectorAll(".touch-indicator");
  const btnLerTudo = document.getElementById("btn-ler-tudo");

const mostrar = () => {
  text.classList.remove("show");
  btnLerTudo.classList.remove("show");
  
  // Reset da barra de progresso
  progress.style.transition = "none";
  progress.style.width = "0%";

  setTimeout(() => {
    text.innerHTML = frases[index];
    text.classList.add("show");

    // Animação da barra
    setTimeout(() => {
      progress.style.transition = "width 8s linear";
      progress.style.width = "100%";
    }, 50);

    // SE FOR A ÚLTIMA FRASE:
    if (index === frases.length - 1) {
      setTimeout(() => {
        // Remove as click-zones para elas não atrapalharem o botão
        document.querySelector(".click-left").style.display = "none";
        document.querySelector(".click-right").style.display = "none";

        btnLerTudo.classList.add("show");
        text.appendChild(btnLerTudo); 

        // Eventos para garantir que funcione em qualquer celular
        btnLerTudo.onpointerdown = (e) => {
          e.stopPropagation();
          abrirMensagem();
        };
        btnLerTudo.onclick = (e) => {
          e.stopPropagation();
          abrirMensagem();
        };
      }, 2000);
    } else {
      // Se ele voltou da última para a penúltima, as click-zones voltam
      document.querySelector(".click-left").style.display = "block";
      document.querySelector(".click-right").style.display = "block";
    }
  }, 400);

  reiniciarTempo();
};

  const proximo = () => { if(index < frases.length - 1){ index++; mostrar(); } };
  const voltar = () => { if(index > 0){ index--; mostrar(); } };

  const reiniciarTempo = () => {
    clearTimeout(timer);
    timer = setTimeout(() => { if(index < frases.length - 1) proximo(); }, 8000);
  };

  clickLeft.addEventListener("pointerdown", (e) => { e.stopPropagation(); if(iniciado) voltar(); });
  clickRight.addEventListener("pointerdown", (e) => { e.stopPropagation(); if(iniciado) proximo(); });

  const iniciarTudo = () => {
    if(iniciado) return;
    iniciado = true;

    music.muted = false;
    music.play().catch(error => {
      setTimeout(() => { music.play(); }, 100);
    });

    start.style.opacity = "0";
    setTimeout(() => { 
      start.style.display = "none"; 
      indicators.forEach(i => i.classList.add("show"));
      mostrar();
    }, 600);
  };

  start.addEventListener("click", iniciarTudo);
  start.addEventListener("touchstart", iniciarTudo); 
});

document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    // Se a aba for minimizada ou o celular bloqueado, pausa a música
    music.pause();
  } else {
    // Se ela voltar para a aba e o site já tiver sido iniciado, retoma a música
    if (iniciado) {
      music.play().catch(err => console.log("Aguardando interação para retomar áudio"));
    }
  }
});
</script>

</body>
</html>
