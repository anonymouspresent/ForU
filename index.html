<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Um pedacinho de luz</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">

<script async src="https://www.googletagmanager.com/gtag/js?id=G-2CB9TRSY4W"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-2CB9TRSY4W');
</script>

<style>
  body {
    margin:0; padding:0; height:100vh; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    font-family:Georgia,serif; color:white; text-align:center;
    background-color: #000;
    background-image:url("fundo.jpg"); background-size:cover; background-position:center;
  }

  .overlay { 
    position:absolute; top:0; left:0; width:100%; height:100%; 
    background:rgba(0,0,0,0.5); z-index:1; 
  }

  /* Mantendo o formato do contêiner anterior */
  .container {
    position: relative;
    z-index: 2;
    width: 85%;
    max-width: 500px;
    padding: clamp(30px, 8vw, 50px);
    background: rgba(0,0,0,0.25);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    border: 1px solid rgba(255, 255, 255, 0.1);
    
    /* Animação suave ao carregar */
    opacity: 0;
    transform: translateY(15px);
    animation: surge 2s ease-out forwards;
  }

  .mensagem {
    font-size: clamp(22px, 5vw, 32px);
    letter-spacing: 1px;
    line-height: 1.4;
    text-shadow: 0 2px 15px rgba(0,0,0,0.9);
  }

  @keyframes surge {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <div class="mensagem">desculpa</div>
</div>

</body>
</html>
